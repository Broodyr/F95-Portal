name: f95_portal
description: "A Flutter mobile app for browsing F95Zone content."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  package_info_plus: ^9.0.0
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  shared_preferences: ^2.3.0
  flutter_cache_manager: ^3.4.1
  html: ^0.15.4
  flutter_avif: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/f95_metadata.json
