org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Pub cache (C:) and project (D:) live on different drives, which breaks Kotlin's
# incremental-compile cache (it can't relativize cross-drive paths) and spams the
# build log with non-fatal stack traces. Negligible cost here — plugins are the
# only Kotlin — so turn incremental off to keep builds quiet.
kotlin.incremental=false
